<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Beacon logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- broadcast rings -->
  <g fill="none" stroke="url(#bg)" stroke-linecap="round">
    <circle cx="32" cy="32" r="26" stroke-width="2" stroke-opacity="0.25"/>
    <circle cx="32" cy="32" r="18" stroke-width="2.4" stroke-opacity="0.5"/>
    <circle cx="32" cy="32" r="10" stroke-width="3" stroke-opacity="0.85"/>
  </g>
  <!-- central beacon -->
  <circle cx="32" cy="32" r="4.5" fill="url(#bg)" filter="url(#glow)"/>
</svg>
