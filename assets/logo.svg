<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Nimbus logo">
  <defs>
    <linearGradient id="nb" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="ng" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- cloud -->
  <path fill="none" stroke="url(#nb)" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"
        d="M18 44 h30 a9 9 0 0 0 1.2 -17.9 A13 13 0 0 0 24.4 20.5 A10 10 0 0 0 16 34 A9 9 0 0 0 18 44 Z"/>
  <!-- signal pulse crossing the cloud -->
  <polyline fill="none" stroke="url(#nb)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"
            filter="url(#ng)"
            points="14,37 24,37 29,27 35,45 40,37 50,37"/>
</svg>
